name: Backend CI/CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_IP }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            PROJECT_DIR="/var/www/backend"

            # 1. Directory and Git Setup
            sudo mkdir -p $PROJECT_DIR
            sudo chown -R $USER:$USER $PROJECT_DIR
            git config --global --add safe.directory $PROJECT_DIR

            # 2. Update Code
            if [ -d "$PROJECT_DIR/.git" ]; then
              cd $PROJECT_DIR && git pull origin main
            else
              git clone https://github.com/${{ github.repository }} $PROJECT_DIR
              cd $PROJECT_DIR
            fi

            # 3. Inject .env from Secrets
            echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

            # 4. Install & Restart (Standard commands now work thanks to the links)
            npm install --production
            
            pm2 delete backend-api || true
            pm2 start server.js --name "backend-api"
            pm2 save
            
            # 5. Reload Nginx
            sudo systemctl reload nginx