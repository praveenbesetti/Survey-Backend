name: Backend CI/CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_IP }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            NODE_BIN="/home/praveenbesetti09/.nvm/versions/node/v24.14.0/bin"
            PROJECT_DIR="/var/www/backend"

            # 1. Fix Permissions First
            sudo mkdir -p $PROJECT_DIR
            sudo chown -R $USER:$USER $PROJECT_DIR
            sudo chown -R $USER:$USER /home/praveenbesetti09/.nvm
            
            # 2. Tell Git this directory is safe
            git config --global --add safe.directory $PROJECT_DIR

            # 3. Clone or Update
            if [ -d "$PROJECT_DIR/.git" ]; then
              cd $PROJECT_DIR && git pull origin main
            else
              git clone https://github.com/${{ github.repository }} $PROJECT_DIR
              cd $PROJECT_DIR
            fi

            # 4. Write .env and fix permissions
            echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
            chmod 600 .env

            # 5. Ensure Binaries are executable
            chmod +x $NODE_BIN/npm
            chmod +x $NODE_BIN/pm2

            # 6. Install and Restart
            $NODE_BIN/npm install --production
            $NODE_BIN/pm2 delete backend-api || true
            $NODE_BIN/pm2 start server.js --name "backend-api"
            $NODE_BIN/pm2 save
            
            sudo systemctl reload nginx