name: Production Docker Build & Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Authenticate with Google Cloud
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          # Ensure this name matches your GitHub Secret name exactly!
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # 2. Login to Artifact Registry so we can push
      - name: Docker Auth
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      # 3. Build the image using the Git files (.) and push to Registry
      - name: Build and Push
        run: |
          docker build -t asia-south1-docker.pkg.dev/secure-487209/myfarmapp/backend-api:latest .
          docker push asia-south1-docker.pkg.dev/secure-487209/myfarmapp/backend-api:latest

      # 4. Convert config files to Base64 for safe transfer
      - name: Prepare Configs
        run: |
          echo "COMPOSE_B64=$(base64 -w 0 docker-compose.yml)" >> "$GITHUB_ENV"
          echo "NGINX_B64=$(base64 -w 0 nginx.conf)" >> "$GITHUB_ENV"

      # 5. SSH to VM: Pull the new image and restart containers
      - name: 'SSH and Deploy'
        run: |
          gcloud compute ssh praveenbesetti09@${{ secrets.GCP_VM_IP }} --zone=asia-south1-c --quiet --command="
            PROJECT_DIR='/var/www/backend'
            sudo mkdir -p \$PROJECT_DIR
            cd \$PROJECT_DIR

            # Recreate the host files from Git data
            echo '${{ env.COMPOSE_B64 }}' | base64 -d > docker-compose.yml
            echo '${{ env.NGINX_B64 }}' | base64 -d > nginx.conf
            echo '${{ secrets.ENV_FILE_CONTENT }}' > .env

            # Authenticate VM's Docker to pull from Registry
            gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

            # Pull only the new image (fast) and restart
            sudo docker compose pull
            sudo docker compose up -d
            
            # Remove the old, dangling images to save space
            sudo docker image prune -f
            echo '✅ Registry image deployed successfully!'
          "