name: Backend CI/CD

on:
  push:
    branches: [ main ] # Runs when you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_IP }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd /var/www/backend
            git pull origin main

            # Create the .env file from GitHub Secrets
            echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

            # Now these commands will be found automatically
            npm install --production
            pm2 restart backend-api || pm2 start server.js --name "backend-api"
            
            # Optional: ensure nginx is fresh
            sudo systemctl reload nginx