name: Backend CI/CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_IP }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            NODE_BIN="/home/praveenbesetti09/.nvm/versions/node/v24.14.0/bin"
            PROJECT_DIR="/var/www/backend"

            # 1. Fix Permissions once and for all
            sudo chown -R praveenbesetti09:praveenbesetti09 $PROJECT_DIR
            cd $PROJECT_DIR

            # 2. Pull Code (No sudo here - let the owner do it)
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # 3. Inject .env
            echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

            # 4. Fresh Install (Using your specific Node version)
            $NODE_BIN/npm install --production

            # 5. PM2 Restart
            $NODE_BIN/pm2 delete backend-api || true
            $NODE_BIN/pm2 start server.js --name "backend-api"
            $NODE_BIN/pm2 save

            # 6. Reload Nginx
            sudo systemctl reload nginx