services:
  backend-api:
    build: .
    container_name: survey-backend
    restart: always
    expose:
      - "5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    container_name: survey-nginx
    restart: always
    ports:
      - "80:80"  # Remove 443! The LB handles that.
    volumes:
      # Mount your simple nginx.conf to the correct Alpine path
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-api