server {
    listen 80;
    server_name web-app-backend.duckdns.org;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name web-app-backend.duckdns.org;

    # SSL Certificate Paths
    ssl_certificate /etc/letsencrypt/live/web-app-backend.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/web-app-backend.duckdns.org/privkey.pem;

    # Performance and Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /api/ {
        # 'backend-api' must match your service name in docker-compose.yml
        # No trailing slash here ensures pathing remains consistent with Express
        proxy_pass http://backend-api:5000;

        # --- UNIVERSAL CORS HEADERS ---
        # This handles the "Blocking" issue even if the backend fails
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        # --- PREFLIGHT (OPTIONS) HANDLING ---
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # --- PROXY HEADERS ---
        # Essential for Express to see the real user IP and Protocol
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support for WebSockets (if needed for socket.io later)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Root location (Optional: for serving a frontend or a fallback)
    location / {
        proxy_pass http://backend-api:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}