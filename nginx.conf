server {
    listen 80;
    server_name hariyalimart.duckdns.org;
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name hariyalimart.duckdns.org;

    # SSL Certificates we generated with Certbot
    ssl_certificate /etc/letsencrypt/live/hariyalimart.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hariyalimart.duckdns.org/privkey.pem;

    # Basic SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Frontend Files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html; # Required for React Router
    }

    # Backend API Proxy
    location /api {
        proxy_pass http://backend-api:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}